name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Run tests
        run: swift test -Xswiftc -warnings-as-errors

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install swiftformat
        run: brew install swiftformat
      - name: Lint Sources and Tests
        run: swiftformat Sources Tests --lint
